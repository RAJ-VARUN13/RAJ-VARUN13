<svg viewBox="0 0 800 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow Filter -->
    <filter id="neonGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Tricolor Gradient representing Indian theme + Modular tech transition -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9933" />   <!-- Saffron -->
      <stop offset="50%" stop-color="#00F3FF" />  <!-- Cyber Cyan -->
      <stop offset="100%" stop-color="#128807" /> <!-- Green -->
    </linearGradient>
  </defs>

  <!-- Python -->
  <g transform="translate(10, 15)">
    <text x="0" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" letter-spacing="0.5">Python (PyTorch, TensorFlow, Pandas, Scikit-learn)</text>
    <rect x="0" y="25" width="700" height="8" rx="4" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
    <rect x="0" y="25" width="665" height="8" rx="4" fill="url(#glowGrad)" filter="url(#neonGlow)"/>
    <text x="720" y="33" fill="#00F3FF" font-family="'Fira Code', Consolas, monospace" font-weight="bold" font-size="13">95%</text>
  </g>

  <!-- C++ -->
  <g transform="translate(10, 70)">
    <text x="0" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" letter-spacing="0.5">C++ (System Architecture &amp; Algorithmic Optimization)</text>
    <rect x="0" y="25" width="700" height="8" rx="4" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
    <rect x="0" y="25" width="595" height="8" rx="4" fill="url(#glowGrad)" filter="url(#neonGlow)"/>
    <text x="720" y="33" fill="#00F3FF" font-family="'Fira Code', Consolas, monospace" font-weight="bold" font-size="13">85%</text>
  </g>

  <!-- Solidity -->
  <g transform="translate(10, 125)">
    <text x="0" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" letter-spacing="0.5">Solidity (Ethereum, Cryptographic Verification)</text>
    <rect x="0" y="25" width="700" height="8" rx="4" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
    <rect x="0" y="25" width="525" height="8" rx="4" fill="url(#glowGrad)" filter="url(#neonGlow)"/>
    <text x="720" y="33" fill="#00F3FF" font-family="'Fira Code', Consolas, monospace" font-weight="bold" font-size="13">75%</text>
  </g>

  <!-- Web Stack -->
  <g transform="translate(10, 180)">
    <text x="0" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" letter-spacing="0.5">MERN Stack (React.js, Node.js, Express, MongoDB)</text>
    <rect x="0" y="25" width="700" height="8" rx="4" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
    <rect x="0" y="25" width="560" height="8" rx="4" fill="url(#glowGrad)" filter="url(#neonGlow)"/>
    <text x="720" y="33" fill="#00F3FF" font-family="'Fira Code', Consolas, monospace" font-weight="bold" font-size="13">80%</text>
  </g>
</svg>
