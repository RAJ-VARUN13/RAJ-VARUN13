<svg viewBox="0 0 800 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow Filter for Gold -->
    <filter id="goldGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gold Gradient -->
    <linearGradient id="goldBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7B1C" />   <!-- Dark Gold -->
      <stop offset="50%" stop-color="#D4AF37" />  <!-- Bright Gold -->
      <stop offset="100%" stop-color="#F3E5AB" /> <!-- Light Soft Gold -->
    </linearGradient>
  </defs>

  <!-- Background container to match GitHub Dark theme seamlessly -->
  <rect width="800" height="230" fill="#040814" rx="6" stroke="#0A192F" stroke-width="1.5"/>

  <!-- Python -->
  <g transform="translate(20, 20)">
    <text x="0" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" letter-spacing="0.5">Python (PyTorch, TensorFlow, Pandas, Scikit-learn)</text>
    <rect x="0" y="25" width="680" height="8" rx="4" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
    <rect x="0" y="25" width="646" height="8" rx="4" fill="url(#goldBarGrad)" filter="url(#goldGlow)"/>
    <text x="700" y="33" fill="#D4AF37" font-family="'Fira Code', Consolas, monospace" font-weight="bold" font-size="13">95%</text>
  </g>

  <!-- C++ -->
  <g transform="translate(20, 75)">
    <text x="0" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" letter-spacing="0.5">C++ (System Architecture &amp; Algorithmic Optimization)</text>
    <rect x="0" y="25" width="680" height="8" rx="4" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
    <rect x="0" y="25" width="578" height="8" rx="4" fill="url(#goldBarGrad)" filter="url(#goldGlow)"/>
    <text x="700" y="33" fill="#D4AF37" font-family="'Fira Code', Consolas, monospace" font-weight="bold" font-size="13">85%</text>
  </g>

  <!-- Solidity -->
  <g transform="translate(20, 130)">
    <text x="0" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" letter-spacing="0.5">Solidity (Ethereum, Cryptographic Verification)</text>
    <rect x="0" y="25" width="680" height="8" rx="4" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
    <rect x="0" y="25" width="510" height="8" rx="4" fill="url(#goldBarGrad)" filter="url(#goldGlow)"/>
    <text x="700" y="33" fill="#D4AF37" font-family="'Fira Code', Consolas, monospace" font-weight="bold" font-size="13">75%</text>
  </g>

  <!-- Web Stack -->
  <g transform="translate(20, 185)">
    <text x="0" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="13" letter-spacing="0.5">MERN Stack (React.js, Node.js, Express, MongoDB)</text>
    <rect x="0" y="25" width="680" height="8" rx="4" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
    <rect x="0" y="25" width="544" height="8" rx="4" fill="url(#goldBarGrad)" filter="url(#goldGlow)"/>
    <text x="700" y="33" fill="#D4AF37" font-family="'Fira Code', Consolas, monospace" font-weight="bold" font-size="13">80%</text>
  </g>
</svg>
