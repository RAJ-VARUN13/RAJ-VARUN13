<svg viewBox="0 0 1000 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .grid-line {
      stroke: #0A192F;
      stroke-width: 0.8;
      stroke-opacity: 0.6;
    }
    .perspective-grid {
      animation: gridScroll 8s linear infinite;
    }
    @keyframes gridScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }
    
    /* Gold Neon Glow Ref */
    .gold-glow {
      stroke: #D4AF37;
      filter: url(#goldGlowRef);
    }
    .cyan-glow {
      stroke: #00F3FF;
      filter: url(#cyanGlowRef);
    }

    .chakra-wire {
      transform-origin: 500px 160px;
      animation: rotateChakra 30s linear infinite;
      stroke: #D4AF37;
      stroke-width: 1.2;
      stroke-opacity: 0.3;
      filter: url(#goldGlowRef);
    }
    @keyframes rotateChakra {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Floating LEGO Wireframes */
    .lego-wire-1 {
      animation: floatLego1 5s ease-in-out infinite;
    }
    .lego-wire-2 {
      animation: floatLego2 6s ease-in-out infinite;
    }
    @keyframes floatLego1 {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(1deg); }
    }
    @keyframes floatLego2 {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(-1.5deg); }
    }

    /* Oscillating Sine Wave (Data streams) */
    .sine-wave-1 {
      stroke: url(#waveGrad1);
      stroke-width: 1.5;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawWave 8s linear infinite;
    }
    .sine-wave-2 {
      stroke: url(#waveGrad2);
      stroke-width: 1;
      stroke-dasharray: 1000;
      stroke-dashoffset: -1000;
      animation: drawWave 10s linear infinite;
    }
    @keyframes drawWave {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }

    /* Scrolling console lines */
    .scrolling-code {
      animation: scrollText 12s linear infinite;
      font-family: 'Fira Code', Consolas, monospace;
      font-size: 10px;
    }
    @keyframes scrollText {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-210px); }
    }

    .cursor {
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    /* Laser wireframe scanner */
    .scanner-line {
      animation: scanVertical 5s ease-in-out infinite;
      stroke: #D4AF37;
      stroke-width: 1.5;
      filter: url(#goldGlowRef);
    }
    @keyframes scanVertical {
      0%, 100% { y1: 0; y2: 0; opacity: 0; }
      10% { opacity: 0.8; }
      50% { y1: 320; y2: 320; opacity: 0.8; }
      90% { opacity: 0.8; }
    }
  </style>

  <defs>
    <!-- Background Gradient: Deep Indigo/Navy to Black -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#050B18" />
      <stop offset="100%" stop-color="#010307" />
    </linearGradient>

    <!-- Wave Gradients -->
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00F3FF" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F3FF" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#10B981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="goldGlowRef" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="cyanGlowRef" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Navy Background -->
  <rect width="1000" height="320" fill="url(#bgGrad)" rx="10"/>

  <!-- Gold/Navy Top Divider Accent -->
  <rect x="0" y="0" width="1000" height="4" fill="#D4AF37" />

  <!-- 3D Perspective Grid Floor -->
  <g clip-path="url(#gridClip)">
    <clipPath id="gridClip">
      <rect x="0" y="160" width="1000" height="160"/>
    </clipPath>
    <g class="perspective-grid">
      <!-- Horizontal moving grid lines -->
      <line x1="-200" y1="180" x2="1200" y2="180" class="grid-line" />
      <line x1="-200" y1="210" x2="1200" y2="210" class="grid-line" />
      <line x1="-200" y1="240" x2="1200" y2="240" class="grid-line" />
      <line x1="-200" y1="270" x2="1200" y2="270" class="grid-line" />
      <line x1="-200" y1="300" x2="1200" y2="300" class="grid-line" />
      <line x1="-200" y1="330" x2="1200" y2="330" class="grid-line" />
    </g>
    <!-- Perspective lines originating from center -->
    <line x1="500" y1="160" x2="-300" y2="320" class="grid-line" />
    <line x1="500" y1="160" x2="-100" y2="320" class="grid-line" />
    <line x1="500" y1="160" x2="100" y2="320" class="grid-line" />
    <line x1="500" y1="160" x2="300" y2="320" class="grid-line" />
    <line x1="500" y1="160" x2="500" y2="320" class="grid-line" />
    <line x1="500" y1="160" x2="700" y2="320" class="grid-line" />
    <line x1="500" y1="160" x2="900" y2="320" class="grid-line" />
    <line x1="500" y1="160" x2="1100" y2="320" class="grid-line" />
    <line x1="500" y1="160" x2="1300" y2="320" class="grid-line" />
  </g>

  <!-- Laser scanning beam -->
  <line x1="0" y1="0" x2="1000" y2="0" class="scanner-line" />

  <!-- Oscillating Waveforms in Background (AI Training loss / Waves) -->
  <path d="M 0 150 Q 150 90 300 150 T 600 150 T 900 150 T 1000 150" fill="none" class="sine-wave-1" />
  <path d="M 0 150 Q 200 200 400 150 T 800 150 T 1000 150" fill="none" class="sine-wave-2" />

  <!-- Rotating Wireframe Ashoka Chakra -->
  <g class="chakra-wire">
    <circle cx="500" cy="160" r="70" stroke-width="1" stroke-dasharray="3 3" fill="none"/>
    <circle cx="500" cy="160" r="14" stroke="#FFFFFF" stroke-width="1.8" fill="none" stroke-opacity="0.6"/>
    <!-- 24 Spokes -->
    <line x1="500" y1="90" x2="500" y2="230" />
    <line x1="430" y1="160" x2="570" y2="160" />
    <line x1="450" y1="110" x2="550" y2="210" />
    <line x1="450" y1="210" x2="550" y2="110" />
    <line x1="475" y1="95" x2="525" y2="225" stroke-opacity="0.7"/>
    <line x1="525" y1="95" x2="475" y2="225" stroke-opacity="0.7"/>
    <line x1="435" y1="135" x2="565" y2="185" stroke-opacity="0.7"/>
    <line x1="435" y1="185" x2="565" y2="135" stroke-opacity="0.7"/>
    <line x1="460" y1="102" x2="540" y2="218" stroke-opacity="0.4"/>
    <line x1="540" y1="102" x2="460" y2="218" stroke-opacity="0.4"/>
    <line x1="440" y1="122" x2="560" y2="198" stroke-opacity="0.4"/>
    <line x1="560" y1="122" x2="440" y2="198" stroke-opacity="0.4"/>
  </g>

  <!-- Left Column: Wireframe LEGO Isometric Blocks (Modular Systems) -->
  <g transform="translate(60, 45)">
    <!-- Cyan Wireframe Block -->
    <g class="lego-wire-1" transform="translate(40, 70)">
      <line x1="0" y1="-25" x2="0" y2="55" stroke="#00F3FF" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
      <!-- Top Face -->
      <path d="M 0 -25 L 45 -5 L 0 15 L -45 -5 Z" fill="#0A182F" fill-opacity="0.5" stroke="#D4AF37" stroke-width="1.8" class="gold-glow"/>
      <!-- Studs -->
      <path d="M -20 -12 L -10 -7 L -20 -2 L -30 -7 Z" fill="none" stroke="#D4AF37" stroke-width="1" class="gold-glow"/>
      <circle cx="-20" cy="-7" r="1.5" fill="#D4AF37"/>
      <path d="M 20 -12 L 30 -7 L 20 -2 L 10 -7 Z" fill="none" stroke="#D4AF37" stroke-width="1" class="gold-glow"/>
      <circle cx="20" cy="-7" r="1.5" fill="#D4AF37"/>
      <path d="M 0 -18 L 10 -13 L 0 -8 L -10 -13 Z" fill="none" stroke="#D4AF37" stroke-width="1" class="gold-glow"/>
      <circle cx="0" cy="-13" r="1.5" fill="#D4AF37"/>
      <path d="M 0 -2 L 10 3 L 0 8 L -10 3 Z" fill="none" stroke="#D4AF37" stroke-width="1" class="gold-glow"/>
      <circle cx="0" cy="3" r="1.5" fill="#D4AF37"/>
      <!-- Left & Right Faces -->
      <path d="M -45 -5 L 0 15 L 0 55 L -45 35 Z" fill="#040A14" fill-opacity="0.6" stroke="#D4AF37" stroke-width="1.8"/>
      <path d="M 0 15 L 45 -5 L 45 35 L 0 55 Z" fill="#060F1F" fill-opacity="0.6" stroke="#D4AF37" stroke-width="1.8"/>
    </g>

    <!-- Saffron Wireframe Block -->
    <g class="lego-wire-2" transform="translate(95, 25)">
      <!-- Top Face -->
      <path d="M 0 -20 L 35 -5 L 0 10 L -35 -5 Z" fill="#1A1202" fill-opacity="0.4" stroke="#00F3FF" stroke-width="1.5" class="cyan-glow"/>
      <!-- Studs -->
      <path d="M -15 -10 L -7 -6 L -15 -2 L -23 -6 Z" fill="none" stroke="#00F3FF" stroke-width="1" class="cyan-glow"/>
      <path d="M 15 -10 L 23 -6 L 15 -2 L 7 -6 Z" fill="none" stroke="#00F3FF" stroke-width="1" class="cyan-glow"/>
      <!-- Left & Right Faces -->
      <path d="M -35 -5 L 0 10 L 0 45 L -35 30 Z" fill="#020C14" fill-opacity="0.6" stroke="#00F3FF" stroke-width="1.5"/>
      <path d="M 0 10 L 35 -5 L 35 30 L 0 45 Z" fill="#03101C" fill-opacity="0.6" stroke="#00F3FF" stroke-width="1.5"/>
    </g>
    
    <!-- Circuits -->
    <circle cx="40" cy="140" r="4" fill="#D4AF37" class="gold-glow"/>
    <circle cx="95" cy="100" r="4" fill="#00F3FF" class="cyan-glow"/>
    <circle cx="140" cy="140" r="4" fill="#10B981" />
  </g>

  <!-- Middle: Linux Terminal Window -->
  <g transform="translate(240, 50)">
    <!-- Terminal Background -->
    <rect x="0" y="0" width="460" height="190" fill="#040814" fill-opacity="0.9" stroke="#0A192F" stroke-width="1.5" rx="6"/>
    <!-- Terminal Header Dots -->
    <circle cx="15" cy="15" r="4" fill="#EF4444"/>
    <circle cx="28" cy="15" r="4" fill="#F59E0B"/>
    <circle cx="41" cy="15" r="4" fill="#10B981"/>
    <text x="60" y="18" fill="#475569" font-family="monospace" font-size="10" letter-spacing="1">zsh - varun@iiit-ranchi</text>

    <!-- Main Title -->
    <text x="15" y="55" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="34" letter-spacing="1">VARUN RAJ</text>
    
    <!-- Prompt Command -->
    <text x="15" y="85" fill="#D4AF37" font-family="'Fira Code', monospace" font-weight="600" font-size="15" filter="url(#goldGlowRef)">$ run systems-ai-orchestration.sh --prod</text>
    
    <!-- Sanskrit Motto -->
    <text x="15" y="115" fill="#D4AF37" font-family="-apple-system, Devanagari, 'Segoe UI', sans-serif" font-weight="600" font-size="14" filter="url(#goldGlowRef)">योगः कर्मसु कौशलम्</text>
    <text x="140" y="115" fill="#E2E8F0" font-family="-apple-system, sans-serif" font-size="13">| Excellence in action is discipline</text>

    <!-- Specs -->
    <text x="15" y="145" fill="#475569" font-family="monospace" font-size="11">OS: Arch Linux x86_64</text>
    <text x="150" y="145" fill="#475569" font-family="monospace" font-size="11">Kernel: IIITR-DS-AI-2028</text>
    <text x="15" y="168" fill="#10B981" font-family="monospace" font-weight="bold" font-size="11">Status: DEPLOYED [System integrity: optimal]</text>
    <text x="310" y="168" fill="#D4AF37" font-family="monospace" font-size="11" class="cursor">_</text>
  </g>

  <!-- Right Column: Scrolling System Logs -->
  <g transform="translate(730, 50)">
    <!-- Viewport -->
    <rect x="0" y="0" width="210" height="190" fill="#02050A" stroke="#0A192F" stroke-width="1.5" rx="6"/>
    <!-- Header -->
    <rect x="0" y="0" width="210" height="20" fill="#090F1E" rx="6"/>
    <text x="10" y="14" fill="#475569" font-family="monospace" font-size="9">agentforge.log</text>
    
    <!-- Logs -->
    <g clip-path="url(#codeClip)">
      <clipPath id="codeClip">
        <rect x="5" y="25" width="200" height="155"/>
      </clipPath>
      <g class="scrolling-code" transform="translate(10, 180)">
        <text x="0" y="0" fill="#D4AF37" opacity="0.9">&gt;&gt; git clone agentforge.git</text>
        <text x="0" y="15" fill="#475569">&gt;&gt; docker-compose build</text>
        <text x="0" y="30" fill="#10B981" font-weight="bold">&gt;&gt; run: multi_agent_orchestrator</text>
        
        <text x="0" y="50" fill="#D4AF37">&gt;&gt; init: enterprise_copilot</text>
        <text x="0" y="65" fill="#475569">&gt;&gt; load: google_adk_nodes</text>
        <text x="0" y="80" fill="#10B981" font-weight="bold">&gt;&gt; query: postgresql (rbac ok)</text>
        
        <text x="0" y="100" fill="#D4AF37">&gt;&gt; sync: iiitians_network</text>
        <text x="0" y="115" fill="#475569">&gt;&gt; deploy: cert_verification.sol</text>
        
        <text x="0" y="135" fill="#D4AF37">&gt;&gt; gas used: 243,180 gwei</text>
        <text x="0" y="150" fill="#475569">&gt;&gt; latency: 12ms (optimal)</text>
        
        <text x="0" y="170" fill="#10B981" font-weight="bold">&gt;&gt; system load: optimal</text>
        <text x="0" y="185" fill="#D4AF37" class="cursor">&gt;&gt; agentforge: active_</text>

        <!-- Loop duplicate text for smooth scroll transition -->
        <text x="0" y="210" fill="#D4AF37" opacity="0.9">&gt;&gt; git clone agentforge.git</text>
        <text x="0" y="225" fill="#475569">&gt;&gt; docker-compose build</text>
        <text x="0" y="240" fill="#10B981" font-weight="bold">&gt;&gt; run: multi_agent_orchestrator</text>
      </g>
    </g>
  </g>

  <!-- Tricolor Accent indicator at bottom right -->
  <g transform="translate(930, 295)">
    <rect x="0" y="0" width="15" height="2" fill="#FF9933" />
    <rect x="15" y="0" width="15" height="2" fill="#FFFFFF" />
    <rect x="30" y="0" width="15" height="2" fill="#128807" />
  </g>
</svg>
