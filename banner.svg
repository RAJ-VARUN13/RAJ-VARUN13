<svg viewBox="0 0 1000 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .grid-line {
      stroke: #1E293B;
      stroke-width: 0.8;
      stroke-opacity: 0.5;
    }
    .perspective-grid {
      animation: gridScroll 12s linear infinite;
    }
    @keyframes gridScroll {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(40px);
      }
    }
    .chakra-wire {
      transform-origin: 500px 160px;
      animation: rotateChakra 25s linear infinite;
      stroke: #FF9933;
      stroke-width: 1;
      stroke-opacity: 0.25;
    }
    @keyframes rotateChakra {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .lego-block-1 {
      animation: floatLego1 5s ease-in-out infinite;
    }
    .lego-block-2 {
      animation: floatLego2 6s ease-in-out infinite;
    }
    @keyframes floatLego1 {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(1deg); }
    }
    @keyframes floatLego2 {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(-1.5deg); }
    }
    .pulse-glow {
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; stroke-width: 1.5; }
    }
    .scrolling-code {
      animation: scrollText 14s linear infinite;
      font-family: 'Fira Code', Consolas, monospace;
      font-size: 10px;
      fill: #10B981;
      opacity: 0.8;
    }
    @keyframes scrollText {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-180px); }
    }
    .cursor {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
  </style>

  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#080F1E" />
      <stop offset="100%" stop-color="#02040A" />
    </linearGradient>

    <!-- Tricolor Linear Accent -->
    <linearGradient id="tricolorAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9933" />
      <stop offset="5%" stop-color="#FF9933" />
      <stop offset="10%" stop-color="#FFFFFF" />
      <stop offset="15%" stop-color="#FFFFFF" />
      <stop offset="20%" stop-color="#128807" />
      <stop offset="100%" stop-color="#128807" stop-opacity="0.05" />
    </linearGradient>

    <!-- Wireframe gradients -->
    <linearGradient id="wireCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F3FF" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="wireSaffron" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9933" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>
  </defs>

  <!-- Deep space background -->
  <rect width="1000" height="320" fill="url(#bgGrad)" rx="10"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1000" height="4" fill="url(#tricolorAccent)"/>

  <!-- 3D Perspective Grid Floor (Linux Core / Wireframe Vibe) -->
  <g clip-path="url(#gridClip)">
    <clipPath id="gridClip">
      <rect x="0" y="180" width="1000" height="140"/>
    </clipPath>
    <g class="perspective-grid">
      <!-- Horizontal moving grid lines -->
      <line x1="-200" y1="200" x2="1200" y2="200" class="grid-line" />
      <line x1="-200" y1="240" x2="1200" y2="240" class="grid-line" />
      <line x1="-200" y1="280" x2="1200" y2="280" class="grid-line" />
      <line x1="-200" y1="320" x2="1200" y2="320" class="grid-line" />
      <line x1="-200" y1="360" x2="1200" y2="360" class="grid-line" />
    </g>
    <!-- Perspective vanishing lines -->
    <line x1="500" y1="180" x2="-300" y2="320" class="grid-line" stroke-opacity="0.8"/>
    <line x1="500" y1="180" x2="-100" y2="320" class="grid-line" stroke-opacity="0.8"/>
    <line x1="500" y1="180" x2="100" y2="320" class="grid-line" stroke-opacity="0.8"/>
    <line x1="500" y1="180" x2="300" y2="320" class="grid-line" stroke-opacity="0.8"/>
    <line x1="500" y1="180" x2="500" y2="320" class="grid-line" stroke-opacity="0.8"/>
    <line x1="500" y1="180" x2="700" y2="320" class="grid-line" stroke-opacity="0.8"/>
    <line x1="500" y1="180" x2="900" y2="320" class="grid-line" stroke-opacity="0.8"/>
    <line x1="500" y1="180" x2="1100" y2="320" class="grid-line" stroke-opacity="0.8"/>
    <line x1="500" y1="180" x2="1300" y2="320" class="grid-line" stroke-opacity="0.8"/>
  </g>

  <!-- Rotating Wireframe Ashoka Chakra in Center Background -->
  <g class="chakra-wire">
    <circle cx="500" cy="160" r="80" stroke="#FF9933" stroke-width="1" stroke-dasharray="2 2" fill="none"/>
    <circle cx="500" cy="160" r="15" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>
    <circle cx="500" cy="160" r="4" fill="#128807" fill-opacity="0.8"/>
    <!-- 24 Spokes -->
    <line x1="500" y1="80" x2="500" y2="240" stroke="#FF9933" />
    <line x1="420" y1="160" x2="580" y2="160" stroke="#FF9933" />
    <line x1="443" y1="103" x2="557" y2="217" stroke="#FF9933" />
    <line x1="443" y1="217" x2="557" y2="103" stroke="#FF9933" />
    <!-- Intermediate spokes -->
    <line x1="474" y1="84" x2="526" y2="236" stroke="#FF9933" stroke-opacity="0.5"/>
    <line x1="526" y1="84" x2="474" y2="236" stroke="#FF9933" stroke-opacity="0.5"/>
    <line x1="424" y1="134" x2="576" y2="186" stroke="#FF9933" stroke-opacity="0.5"/>
    <line x1="424" y1="186" x2="576" y2="134" stroke="#FF9933" stroke-opacity="0.5"/>
    <line x1="454" y1="94" x2="546" y2="226" stroke="#FF9933" stroke-opacity="0.3"/>
    <line x1="546" y1="94" x2="454" y2="226" stroke="#FF9933" stroke-opacity="0.3"/>
    <line x1="434" y1="114" x2="566" y2="206" stroke="#FF9933" stroke-opacity="0.3"/>
    <line x1="566" y1="114" x2="434" y2="206" stroke="#FF9933" stroke-opacity="0.3"/>
  </g>

  <!-- Left Column: Futuristic 3D Holographic Wireframe LEGO Blocks -->
  <g transform="translate(60, 45)">
    <!-- Cyan Wireframe Block (Lego shape floating) -->
    <g class="lego-block-1" transform="translate(40, 70)">
      <!-- Projection Lines -->
      <line x1="0" y1="-25" x2="0" y2="25" stroke="#00F3FF" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.5"/>
      <line x1="-40" y1="-5" x2="-40" y2="45" stroke="#00F3FF" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.5"/>
      <line x1="40" y1="-5" x2="40" y2="45" stroke="#00F3FF" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.5"/>

      <!-- Block Geometry -->
      <!-- Top Face -->
      <path d="M 0 -25 L 45 -5 L 0 15 L -45 -5 Z" fill="#0B1E2E" fill-opacity="0.4" stroke="url(#wireCyan)" stroke-width="1.8"/>
      <!-- Studs on top of Lego block -->
      <path d="M -20 -12 L -10 -7 L -20 -2 L -30 -7 Z" fill="none" stroke="#00F3FF" stroke-width="1"/>
      <circle cx="-20" cy="-7" r="1.5" fill="#00F3FF"/>
      <path d="M 20 -12 L 30 -7 L 20 -2 L 10 -7 Z" fill="none" stroke="#00F3FF" stroke-width="1"/>
      <circle cx="20" cy="-7" r="1.5" fill="#00F3FF"/>
      <path d="M 0 -18 L 10 -13 L 0 -8 L -10 -13 Z" fill="none" stroke="#00F3FF" stroke-width="1"/>
      <circle cx="0" cy="-13" r="1.5" fill="#00F3FF"/>
      <path d="M 0 -2 L 10 3 L 0 8 L -10 3 Z" fill="none" stroke="#00F3FF" stroke-width="1"/>
      <circle cx="0" cy="3" r="1.5" fill="#00F3FF"/>

      <!-- Left Face -->
      <path d="M -45 -5 L 0 15 L 0 55 L -45 35 Z" fill="#07131D" fill-opacity="0.6" stroke="url(#wireCyan)" stroke-width="1.8"/>
      <!-- Right Face -->
      <path d="M 0 15 L 45 -5 L 45 35 L 0 55 Z" fill="#091A29" fill-opacity="0.6" stroke="url(#wireCyan)" stroke-width="1.8"/>
    </g>

    <!-- Saffron Stacked Wireframe Block (glowing/floating above) -->
    <g class="lego-block-2" transform="translate(95, 25)">
      <!-- Top Face -->
      <path d="M 0 -20 L 35 -5 L 0 10 L -35 -5 Z" fill="#2E1C0B" fill-opacity="0.3" stroke="url(#wireSaffron)" stroke-width="1.5"/>
      <!-- Studs -->
      <path d="M -15 -10 L -7 -6 L -15 -2 L -23 -6 Z" fill="none" stroke="#FF9933" stroke-width="0.8"/>
      <path d="M 15 -10 L 23 -6 L 15 -2 L 7 -6 Z" fill="none" stroke="#FF9933" stroke-width="0.8"/>
      <!-- Left Face -->
      <path d="M -35 -5 L 0 10 L 0 45 L -35 30 Z" fill="#1F1105" fill-opacity="0.5" stroke="url(#wireSaffron)" stroke-width="1.5"/>
      <!-- Right Face -->
      <path d="M 0 10 L 35 -5 L 35 30 L 0 45 Z" fill="#261608" fill-opacity="0.5" stroke="url(#wireSaffron)" stroke-width="1.5"/>
    </g>
    
    <!-- AI connecting neural lines / vector network overlay -->
    <path d="M 40 140 L 95 100 L 140 140" stroke="#00F3FF" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="40" cy="140" r="3.5" fill="#00F3FF" class="pulse-glow"/>
    <circle cx="95" cy="100" r="3.5" fill="#FF9933" class="pulse-glow"/>
    <circle cx="140" cy="140" r="3.5" fill="#128807" class="pulse-glow"/>
  </g>

  <!-- Middle: Advanced Corporate Identity & Philosophy -->
  <g transform="translate(240, 50)">
    <!-- Linux terminal background box -->
    <rect x="0" y="0" width="460" height="190" fill="#050913" fill-opacity="0.85" stroke="#1E293B" stroke-width="1.5" rx="6"/>
    <!-- Terminal header dots -->
    <circle cx="15" cy="15" r="4" fill="#EF4444"/>
    <circle cx="28" cy="15" r="4" fill="#F59E0B"/>
    <circle cx="41" cy="15" r="4" fill="#10B981"/>
    <text x="60" y="18" fill="#475569" font-family="monospace" font-size="10" letter-spacing="1">zsh - varun@iiit-ranchi</text>

    <!-- Main Title -->
    <text x="15" y="55" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="34" letter-spacing="1">VARUN RAJ</text>
    
    <!-- Role Command line -->
    <text x="15" y="85" fill="#00F3FF" font-family="'Fira Code', monospace" font-weight="600" font-size="15">$ run science-ai-core.sh --dev</text>
    
    <!-- Motto Devotional / Sanskrit Text -->
    <text x="15" y="115" fill="#E2E8F0" font-family="-apple-system, Devanagari, 'Segoe UI', sans-serif" font-weight="500" font-size="14">योगः कर्मसु कौशलम्</text>
    <text x="140" y="115" fill="#94A3B8" font-family="-apple-system, sans-serif" font-size="13">| Excellence in action is discipline</text>

    <!-- Terminal System Stats -->
    <text x="15" y="145" fill="#64748B" font-family="monospace" font-size="11">OS: Arch Linux x86_64</text>
    <text x="150" y="145" fill="#64748B" font-family="monospace" font-size="11">Kernel: IIITR-DS-AI-2028</text>
    <text x="15" y="165" fill="#10B981" font-family="monospace" font-size="11">Status: SUCCESSFUL_BUILD [100% Core Load]</text>
    <text x="290" y="165" fill="#00F3FF" font-family="monospace" font-size="11" class="cursor">_</text>
  </g>

  <!-- Right Column: Scrolling Code/Matrix Terminal (Linux & Open Source) -->
  <g transform="translate(730, 50)">
    <!-- Terminal viewport -->
    <rect x="0" y="0" width="210" height="190" fill="#02050A" stroke="#1E293B" stroke-width="1.5" rx="6"/>
    <!-- Terminal header -->
    <rect x="0" y="0" width="210" height="20" fill="#090F1E" rx="6"/>
    <text x="10" y="14" fill="#64748B" font-family="monospace" font-size="9">process_logs.log</text>
    <circle cx="195" cy="10" r="3" fill="#64748B"/>
    
    <!-- Code scroll area -->
    <g clip-path="url(#codeClip)">
      <clipPath id="codeClip">
        <rect x="5" y="25" width="200" height="155"/>
      </clipPath>
      <g class="scrolling-code" transform="translate(10, 180)">
        <text x="0" y="0">&gt;&gt; git clone comfyui.git</text>
        <text x="0" y="15">&gt;&gt; patch: unet_diagnostics.py</text>
        <text x="0" y="30">&gt;&gt; status: 200 OK (merged)</text>
        <text x="0" y="45">&gt;&gt; solidity compile --version 0.8.20</text>
        <text x="0" y="60">&gt;&gt; deploy: cert_verification.sol</text>
        <text x="0" y="75">&gt;&gt; gas used: 243,180 gwei</text>
        <text x="0" y="90">&gt;&gt; train: demand_forecaster.py</text>
        <text x="0" y="105">&gt;&gt; epoch 150/150 - loss: 0.0024</text>
        <text x="0" y="120">&gt;&gt; k-means: fit_predict(X_scaled)</text>
        <text x="0" y="135">&gt;&gt; clusters: 5 (silhouette: 0.72)</text>
        <text x="0" y="150">&gt;&gt; system load: optimal</text>
        <text x="0" y="165">&gt;&gt; kernel: core_load_complete</text>
        <!-- Loop duplicate text for smooth scroll transition -->
        <text x="0" y="180">&gt;&gt; git clone comfyui.git</text>
        <text x="0" y="195">&gt;&gt; patch: unet_diagnostics.py</text>
        <text x="0" y="210">&gt;&gt; status: 200 OK (merged)</text>
        <text x="0" y="225">&gt;&gt; solidity compile --version 0.8.20</text>
        <text x="0" y="240">&gt;&gt; deploy: cert_verification.sol</text>
        <text x="0" y="255">&gt;&gt; gas used: 243,180 gwei</text>
      </g>
    </g>
  </g>

  <!-- Tricolor Accent indicator at bottom right -->
  <g transform="translate(930, 290)">
    <rect x="0" y="0" width="15" height="3" fill="#FF9933" />
    <rect x="15" y="0" width="15" height="3" fill="#FFFFFF" />
    <rect x="30" y="0" width="15" height="3" fill="#128807" />
  </g>

  <!-- Network latency / speed indicators at bottom left -->
  <g transform="translate(45, 290)" fill="#64748B" font-family="monospace" font-size="9" opacity="0.6">
    <text x="0" y="8">LATENCY: 12ms</text>
    <text x="90" y="8">IO: OPTIMAL</text>
  </g>
</svg>
